<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLift Edge Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #00ff66;
            --neon-red: #ff003c;
            --bg-dark: #050a15;
            --hud-color: var(--neon-blue);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Video Container */
        .scanner-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #cameraFeed {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(80%) contrast(1.2) brightness(0.7);
            z-index: 1;
        }

        /* HUD Overlay */
        .hud-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 2;
            background: 
                linear-gradient(rgba(5, 10, 21, 0.4) 0%, rgba(5, 10, 21, 0.8) 100%),
                radial-gradient(circle at center, transparent 40%, var(--bg-dark) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* Grid Background Pattern */
        .hud-overlay::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }

        /* Center Targeting Box */
        .target-box {
            position: relative;
            width: 300px;
            height: 400px;
            border: 2px solid rgba(0, 243, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1) inset;
            transition: all 0.5s ease;
        }

        .target-box::before, .target-box::after,
        .target-box-inner::before, .target-box-inner::after {
            content: '';
            position: absolute;
            width: 40px; height: 40px;
            border-color: var(--hud-color);
            border-style: solid;
            transition: all 0.5s;
        }
        
        .target-box::before { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 20px; }
        .target-box::after { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-top-right-radius: 20px;}
        .target-box-inner::before { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-bottom-left-radius: 20px;}
        .target-box-inner::after { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 20px;}

        /* Scanning Laser */
        .laser {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--hud-color);
            box-shadow: 0 0 20px var(--hud-color), 0 0 40px var(--hud-color);
            border-radius: 2px;
            animation: scan 2.5s infinite ease-in-out;
            opacity: 0;
            z-index: 5;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            50% { top: 100%; opacity: 1;}
            90% { opacity: 1; }
            100% { top: 0; opacity: 0; }
        }

        /* Status Text */
        .status-container {
            margin-top: 40px;
            text-align: center;
            z-index: 10;
        }

        .status-header {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
        }

        .status-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--hud-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--hud-color);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .instruction-text {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.8);
            margin-top: 15px;
            height: 30px;
        }

        /* Demo Controls (Invisible until clicked/hovered) */
        .stage-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            opacity: 0.05; /* Barely visible */
            transition: opacity 0.3s;
        }
        
        .stage-controls:hover { opacity: 1; pointer-events: auto; }

        .stage-controls select {
            background: rgba(0,0,0,0.8);
            color: white;
            border: 1px solid var(--neon-blue);
            padding: 8px 15px;
            border-radius: 5px;
            font-family: monospace;
            outline: none;
        }

        .debug-btn {
            background: var(--neon-blue);
            color: black;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
        }
        
        .liveliness-indicator {
            display: inline-block;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid var(--hud-color);
            margin-left: 10px;
            transition: all 0.3s;
        }
    </style>
</head>
<body>

    <div class="scanner-container">
        <!-- Live Video -->
        <video id="cameraFeed" autoplay playsinline muted></video>

        <!-- HUD -->
        <div class="hud-overlay">
            <div class="target-box" id="targetBox">
                <div class="target-box-inner"></div>
                <div class="laser" id="laser"></div>
            </div>

            <div class="status-container">
                <div class="status-header">NODE 01: BIOMETRIC TERMINAL</div>
                <div class="status-text" id="statusMain">AWAITING SUBJECT</div>
                <div class="instruction-text" id="instruction">Please step into the frame.</div>
            </div>
        </div>
    </div>

    <!-- Hidden Canvas for OpenCV Frame Capture -->
    <canvas id="captureCanvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('cameraFeed');
        const statusMain = document.getElementById('statusMain');
        const instruction = document.getElementById('instruction');
        const targetBox = document.getElementById('targetBox');
        const laser = document.getElementById('laser');
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let isScanning = false;

        // Start Camera
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'user' } })
            .then(stream => {
                video.srcObject = stream;
                // Once video plays, set canvas dimensions
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    // Start automatic background scanning!
                    startAutoScanner();
                };
            })
            .catch(err => {
                console.error(err);
                instruction.innerText = "Camera disconnected. (Check Chrome flags)";
                instruction.style.color = "var(--neon-red)";
            });
        }

        function setHudColor(color) {
            document.documentElement.style.setProperty('--hud-color', color);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function captureFrameBase64() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            // Compress heavily for faster network transmission to FAISS
            return canvas.toDataURL('image/jpeg', 0.6); 
        }

        async function triggerFaissVerification() {
            if (isScanning) return;
            isScanning = true;

            // Step 1: Visual Lock-on
            setHudColor('var(--neon-blue)');
            statusMain.innerText = "ANALYZING";
            instruction.innerText = "Running DeepFace Vector Extraction...";
            laser.style.display = 'block';

            // Wait 1 second to show the cool scanning animation
            await sleep(1000);

            // Step 2: Liveness Check warning
            setHudColor('#ffaa00');
            targetBox.style.transform = 'scale(0.95)';
            statusMain.innerText = "LIVELINESS CHECK";
            instruction.innerHTML = `Verify humanity. <span style="font-weight:bold; color:white;">👉 BLINK DETECTING 👈</span> <div class="liveliness-indicator" id="blinkPulse"></div>`;
            
            await sleep(1500);

            // Capture Frame in background
            const imageBase64 = captureFrameBase64();
            instruction.innerText = "Querying FAISS Vector Database...";

            try {
                // Step 3: Hit our powerful Machine Learning API
                const response = await fetch('/api/faiss_verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageBase64 })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // Match found!
                    targetBox.style.transform = 'scale(1.05)';
                    setHudColor('var(--neon-green)');
                    laser.style.display = 'none';
                    
                    statusMain.innerText = "ACCESS GRANTED";
                    instruction.innerHTML = `Identity Verified: <b style="color:var(--neon-green); font-size:1.3rem;">${data.user}</b> <br> <span style="font-size:0.9rem; opacity:0.8;">[FAISS: ${data.msg}]</span>`;

                    await sleep(4000);
                } else {
                    // No match or no face
                    targetBox.style.transform = 'scale(0.9)';
                    setHudColor('var(--neon-red)');
                    laser.style.display = 'none';
                    
                    statusMain.innerText = "ACCESS DENIED";
                    instruction.innerHTML = `<span style="color:var(--neon-red)">${data.message || 'Face Not Recognized'}</span>`;

                    await sleep(2000);
                }

            } catch (err) {
                console.error(err);
                setHudColor('var(--neon-red)');
                statusMain.innerText = "EDGE AI OFFLINE";
                instruction.innerText = "Network or Model Error";
                await sleep(2000);
            }

            resetScanner();
        }

        function resetScanner() {
            isScanning = false;
            setHudColor('var(--neon-blue)');
            targetBox.style.transform = 'scale(1)';
            statusMain.innerText = "AWAITING SUBJECT";
            instruction.innerText = "Please step into the frame.";
            laser.style.display = 'none';
        }

        function startAutoScanner() {
            setInterval(() => {
                if (!isScanning) {
                    // Automatically trigger if it detects movement? 
                    // For the stage demo, it will trigger pinging every 5 seconds natively.
                    triggerFaissVerification();
                }
            }, 6000);
        }

        // Failsafe demo override: Double click screen to instantly trigger scan
        document.body.addEventListener('dblclick', (e) => {
            if (!isScanning) {
                triggerFaissVerification();
            }
        });

    </script>
</body>
</html>
