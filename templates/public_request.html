<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLift - Public Access Request</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div class="glass-panel" style="width: 100%; max-width: 600px; padding: 3rem;">
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--accent);"><i class="fa-solid fa-elevator"></i> Gateway Request</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Submit a Temporal Lift Access request directly to your respective institution.</p>
        
        <form method="POST">
            <div class="form-group">
                <label>Institution / Tenant Hub</label>
                <select name="tenant_id" required>
                    {% for t in tenants %}
                    <option value="{{ t.id }}">{{ t.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Role</label>
                <select name="role" id="reqRoleSelector" onchange="toggleReqFields()">
                    <option value="Student">Student</option>
                    <option value="Faculty">Faculty</option>
                    <option value="Visitor">Guest / Vendor</option>
                </select>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="John Doe">
            </div>
            
            <div class="form-group">
                <label>Contact Email Verification</label>
                <input type="email" name="email" required placeholder="identity@domain.edu">
            </div>
            
            <div id="reqAcademicFields" style="background:rgba(255,255,255,0.05); padding:1rem; border-radius:8px; margin-bottom:1rem;">
                <div class="form-group"><label>Enrollment / ID Number</label><input type="text" name="enrollment_id" id="reqEnrollInput"></div>
                <div class="form-group"><label>Department</label><input type="text" name="department"></div>
            </div>

            <div class="form-group">
                <label>Detailed Justification for Lift Request (e.g. Broken Leg, Delivery)</label>
                <textarea name="reason" required style="width:100%; background:white; border:1.5px solid var(--border); color:var(--text-main); padding:0.8rem; border-radius:4px; min-height:80px;"></textarea>
            </div>
            
            <div style="display:flex; gap:1rem;">
                <div class="form-group" style="flex:1;">
                    <label>Duration Required (Hours)</label>
                    <input type="number" name="requested_duration_hours" min="1" max="720" value="24" required>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Required Floors (e.g. 0,1)</label>
                    <input type="text" name="floors" value="0,1" required>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top:1rem; font-size:1.1rem; padding:1rem;"><i class="fa-solid fa-paper-plane"></i> Transmit Request Payload</button>
        </form>
    </div>

    <script>
    function toggleReqFields() {
        const role = document.getElementById('reqRoleSelector').value;
        const block = document.getElementById('reqAcademicFields');
        const enrollInput = document.getElementById('reqEnrollInput');
        if(role === 'Student' || role === 'Faculty') {
            block.style.display = 'block';
            enrollInput.required = true;
        } else {
            block.style.display = 'none';
            enrollInput.required = false;
        }
    }
    toggleReqFields();
    </script>
</body>
</html>
